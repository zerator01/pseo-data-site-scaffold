name: Refresh Data

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Refresh source data
        run: npm run data:refresh

      - name: Validate data
        run: npm run data:validate

      - name: Update refresh metadata
        run: |
          node -e "
            const fs = require('fs');
            const p = 'data/data-manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf-8'));
            const now = new Date().toISOString();
            m.last_refresh = now;
            m.last_build = now;
            fs.writeFileSync(p, JSON.stringify(m, null, 2));
          "

      - name: Stop unless publish mode is fully automatic
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('data/data-manifest.json', 'utf-8'));
            const publishMode = m.refresh_policy?.publish_mode || 'manual_review_required';
            const reviewRequired = Boolean(m.refresh_policy?.review_required);
            if (publishMode !== 'fully_automatic' || reviewRequired) {
              console.log('Refresh completed, waiting for manual review because publish_mode=', publishMode, 'review_required=', reviewRequired);
              process.exit(1);
            }
          "

      - name: Commit data changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || git commit -m "chore: refresh data $(date +%Y-%m-%d)"
          git push
