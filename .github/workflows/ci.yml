name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-scaffold:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize scaffold
        run: npm run init:project

      - name: Refresh sample data
        run: npm run refresh:data

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  smoke-create-project:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: verify-scaffold

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test generator
        run: npm run smoke:create-project
