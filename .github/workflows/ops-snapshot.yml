name: Ops Snapshot

on:
  schedule:
    - cron: '15 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  generate-ops-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize scaffold
        run: npm run init:project

      - name: Refresh sample data
        run: npm run refresh:data

      - name: Generate ops artifacts
        run: npm run ops:generate

      - name: Upload ops artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ops-snapshot-${{ github.run_id }}
          path: docs/ops/generated/
          if-no-files-found: error

      - name: Publish weekly ops issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('docs/ops/generated/weekly-ops-summary.md', 'utf8');
            const digest = fs.readFileSync('docs/ops/generated/refresh-digest.md', 'utf8');
            const queue = fs.readFileSync('docs/ops/generated/qa-sampling-queue.md', 'utf8');
            const plan = fs.readFileSync('docs/ops/generated/weekly-ops-plan.md', 'utf8');
            const review = fs.readFileSync('docs/ops/generated/weekly-ops-review.md', 'utf8');

            const title = `Ops Snapshot: ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              'Automated weekly ops snapshot generated by GitHub Actions.',
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              plan,
              '',
              '---',
              '',
              review,
              '',
              '---',
              '',
              summary,
              '',
              '---',
              '',
              digest,
              '',
              '---',
              '',
              queue,
            ].join('\n');

            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]',
              per_page: 100,
            });

            const existingIssue = existingIssues.find((issue) => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body,
                labels: ['ops', 'automated'],
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ops', 'automated'],
              });
            }
